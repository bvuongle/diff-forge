<svg width="512" height="512" viewBox="0 0 100 100" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- ANVIL BASE (Subtle Foundation) -->
  <path d="M25 85 L75 85 L70 75 L30 75 Z" fill="#1E1E1E"/> 
  <path d="M40 75 L60 75 L60 65 L40 65 Z" fill="#2D2D2D"/> 
  <path d="M20 50 C20 50 20 65 35 65 H80 V50 H20Z" fill="#1E1E1E"/>

  <!-- DIAGONAL HAMMER (Top Right, Striking Down-Left) -->
  <g transform="rotate(-45 80 20)">
    <rect x="78" y="20" width="4" height="40" rx="1" fill="#444444"/>
    <rect x="65" y="0" width="30" height="20" rx="2" fill="#1E1E1E" stroke="#333333" stroke-width="1"/>
  </g>

  <!-- THE SUBJECT: GLOWING F-GRAPH (Highest Z-Index) -->
  <g transform="translate(0, -5)">
    <!-- Glow/Halo for contrast -->
    <path d="M40 32 H68 M40 48 H60 M40 32 V64" stroke="white" stroke-width="6" stroke-linecap="round" opacity="0.2"/>
    <path d="M40 32 H68 M40 48 H60 M40 32 V64" stroke="#3B82F6" stroke-width="4.5" stroke-linecap="round"/>
    
    <!-- Large prominent nodes -->
    <circle cx="40" cy="32" r="5" fill="#3B82F6"/> <!-- Top Left -->
    <circle cx="68" cy="32" r="5" fill="#3B82F6"/> <!-- Top Right -->
    <circle cx="40" cy="48" r="5" fill="#3B82F6"/> <!-- Mid Left -->
    <circle cx="60" cy="48" r="5" fill="#3B82F6"/> <!-- Mid Right -->
    <circle cx="40" cy="64" r="5" fill="#3B82F6"/> <!-- Bottom Left -->
    
    <!-- Bright inner highlights -->
    <circle cx="40" cy="64" r="2.5" fill="white"/>
    <circle cx="68" cy="32" r="2.5" fill="white"/>
  </g>
</svg>
